name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # git-cliff needs full history

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller==6.11.1

      - name: Generate icon
        run: python scripts/generate_icon.py

      - name: Extract version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Generate CHANGELOG with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose --latest --strip all --tag "${{ github.ref_name }}"
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Patch version in source
        shell: bash
        run: |
          sed -i "s/__version__ = \".*\"/__version__ = \"$APP_VERSION\"/" src/whisper_dictation/__init__.py

      - name: Build with PyInstaller
        run: pyinstaller whisper_dictation.spec

      - name: Install Inno Setup 6
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: iscc /DAppVersion=${{ env.APP_VERSION }} installer\whisper_dictation.iss

      - name: Zip portable build
        shell: pwsh
        run: Compress-Archive -Path dist\whisper-dictation -DestinationPath "dist\WhisperDictation-${{ github.ref_name }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            installer/output/WhisperDictation-Setup-*.exe
            dist/WhisperDictation-${{ github.ref_name }}-portable.zip
            CHANGELOG.md
