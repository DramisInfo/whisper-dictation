name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller==6.11.1

      - name: Generate icon
        run: python scripts/generate_icon.py

      - name: Write version.txt
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > version.txt
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build with PyInstaller
        run: pyinstaller whisper_dictation.spec

      - name: Install Inno Setup 6
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer\whisper_dictation.iss

      - name: Zip portable build
        shell: pwsh
        run: Compress-Archive -Path dist\whisper-dictation -DestinationPath "dist\WhisperDictation-${{ github.ref_name }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            installer/output/WhisperDictation-Setup-*.exe
            dist/WhisperDictation-${{ github.ref_name }}-portable.zip
