# git-cliff configuration — https://git-cliff.org/docs/configuration
# Generates a conventional-commits changelog grouped by type.

[changelog]
header = ""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.breaking %}[**BREAKING**] {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{%- endfor %}
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_parsers = [
  { message = "^feat",     group = "🚀 New Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "🔧 Refactoring" },
  { message = "^docs",     group = "📖 Documentation" },
  { message = "^style",    group = "🎨 Styling" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^chore",    group = "🏗️ Maintenance" },
  { message = "^ci",       group = "🔄 CI/CD" },
  { message = ".*",        group = "📦 Other" },
]

filter_commits = false
tag_pattern = "v[0-9].*"
topo_order = false
sort_commits = "newest"
